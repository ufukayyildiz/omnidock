  <text x="268" y="392" fill="#d1fae5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28">Workers · Email Routing · Email Sending · D1 · R2</text>

