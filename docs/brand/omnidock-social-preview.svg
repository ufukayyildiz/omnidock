  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <path d="M0 96H1280M0 192H1280M0 288H1280M0 384H1280M0 480H1280M0 576H1280M96 0V640M192 0V640M288 0V640M384 0V640M480 0V640M576 0V640M672 0V640M768 0V640M864 0V640M960 0V640M1056 0V640M1152 0V640" stroke="#22c55e" stroke-opacity="0.16"/>

